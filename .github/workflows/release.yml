name: Release DNS binary

on:
  push:
    tags:
      - 'dns-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/5gpn-dns/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # Build the control-console SPA BEFORE packaging it into the 5gpn-web
      # release tarball (daemon serves it from disk via DNS_WEB_DIR, not go:embed).
      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      - name: Build
        run: |
          cd cmd/5gpn-dns
          # Stamp the release version into main.version (strip the dns- tag prefix,
          # e.g. dns-v0.1.0 -> v0.1.0) so GET /api/status reports the real build.
          VER="${GITHUB_REF_NAME#dns-}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=${VER}" -o 5gpn-dns-linux-amd64 .
          sha256sum 5gpn-dns-linux-amd64 > checksums.txt

      - name: Package web UI
        run: |
          VER="${GITHUB_REF_NAME#dns-}"
          tar czf "5gpn-web-${VER}.tar.gz" -C web/dist .
          sha256sum "5gpn-web-${VER}.tar.gz" >> cmd/5gpn-dns/checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cmd/5gpn-dns/5gpn-dns-linux-amd64
            cmd/5gpn-dns/checksums.txt
            5gpn-web-*.tar.gz
