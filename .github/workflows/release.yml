name: Release DNS binary

on:
  push:
    tags:
      - 'dns-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/5gpn-dns/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cmd/5gpn-dns/web/package-lock.json

      # Build the control-console SPA BEFORE the Go build so go:embed
      # (cmd/5gpn-dns/web/dist) bundles the real UI, not the committed placeholder.
      - name: Build web UI
        run: |
          cd cmd/5gpn-dns/web
          npm ci
          npm run build

      - name: Build
        run: |
          cd cmd/5gpn-dns
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o 5gpn-dns-linux-amd64 .
          sha256sum 5gpn-dns-linux-amd64 > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cmd/5gpn-dns/5gpn-dns-linux-amd64
            cmd/5gpn-dns/checksums.txt
