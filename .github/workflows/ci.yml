name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pure-grep shell policy tests only — no Python, no Go toolchain needed.
      # (The bot is now an in-process Go component; all Python is removed.
      # The authoritative go vet + `go test -race` runs in the `go` job below.)
      - name: Shell policy tests
        run: |
          for t in tests/test_*.sh; do
            echo "--- $t ---"; bash "$t" || exit 1
          done

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/5gpn-dns/go.mod

      - name: go vet and test
        run: |
          cd cmd/5gpn-dns
          go vet ./...
          # -race catches data races in the concurrent control server + subscription
          # manager (ubuntu runners ship gcc, so cgo/-race works out of the box).
          go test -race ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cmd/5gpn-dns/web/package-lock.json

      # Frontend gate: the SPA must type-check and build cleanly. The release
      # workflow runs the same build to produce the embedded dist.
      - name: Build + typecheck web UI
        run: |
          cd cmd/5gpn-dns/web
          npm ci
          npm run build
          npm run typecheck
