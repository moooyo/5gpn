apiVersion: 5gpn.io/v1
kind: Extension

metadata:
  id: io.5gpn.apple-wloc
  name: Apple WLOC Location Override
  version: 1.0.0
  description: Rewrites Apple Wi-Fi and cellular location responses to an operator-selected point.

permissions:
  persistentStorage: false

traffic:
  captureHosts:
    - gs-loc.apple.com
    - gs-loc-cn.apple.com

settings:
  - key: location
    type: location
    label: Target location
    description: Every authorized device using this extension receives the same configured location.
    required: true
    default:
      accuracy: 25
  - key: failClosed
    type: boolean
    label: Block on transformation failure
    description: Prevents an unexpected protocol change from returning the original location response.
    required: true
    default: true

actions:
  - id: rewrite-wloc-response
    phase: response
    match:
      hosts:
        - gs-loc.apple.com
        - gs-loc-cn.apple.com
      schemes:
        - https
      pathRegex: '^/clls/wloc(\?.*)?$'
      statusCodes:
        - 200
    script:
      source: ./wloc.js
      bodyMode: binary
      timeoutMs: 1500
      maxBodyBytes: 8388608
